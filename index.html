<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/aurora-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aurora Language Assistant</title>

    <!-- DNS prefetch for external domains -->
    <link rel="dns-prefetch" href="//fonts.googleapis.com">
    <link rel="dns-prefetch" href="//fonts.gstatic.com">
    <link rel="dns-prefetch" href="//api.github.com">
    <link rel="dns-prefetch" href="//cdnjs.cloudflare.com">

    <!-- Preconnect to critical external resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Early hints for critical resources -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap">
    <link rel="preload" as="font" href="/fonts/inter-var.woff2" type="font/woff2" crossorigin="anonymous">

    <!-- Preload critical application chunks -->
    <link rel="modulepreload" href="/src/main.jsx">
    <link rel="modulepreload" href="/src/App.jsx">
    <link rel="modulepreload" href="/src/components/layout/main-layout.jsx">

    <!-- Load critical CSS asynchronously with fallback -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"></noscript>

    <!-- PWA and mobile optimization -->
    <meta name="theme-color" content="#0d1117">
    <meta name="color-scheme" content="dark light">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Aurora">

    <!-- Prefetch likely next pages -->
    <link rel="prefetch" href="/course-listing">
    <link rel="prefetch" href="/games">
    <link rel="prefetch" href="/community">
    <link rel="prefetch" href="/learning">

    <!-- Prefetch critical API endpoints -->
    <link rel="prefetch" href="/api/user/profile">
    <link rel="prefetch" href="/api/courses/featured">

    <!-- Preload critical assets -->
    <link rel="preload" as="image" href="/aurora-logo.png">
    <link rel="preload" as="image" href="/default-avatar.png">

    <!-- Performance and SEO meta tags -->
    <meta name="description" content="AI-powered language learning platform for interactive English education">
    <meta name="keywords" content="language learning, English, AI, education, interactive">
    <meta name="robots" content="index, follow">
    <meta name="author" content="Aurora Learning Team">

    <!-- Open Graph and Twitter Cards -->
    <meta property="og:title" content="Aurora Language Assistant">
    <meta property="og:description" content="AI-powered language learning platform">
    <meta property="og:image" content="/aurora-social-preview.png">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Aurora Language Assistant">
    <meta name="twitter:description" content="AI-powered language learning platform">

    <!-- Critical CSS - Inlined for fastest rendering -->
    <style>
      /* Reset and base styles */
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        line-height: 1.5;
        -webkit-text-size-adjust: 100%;
        tab-size: 4;
      }

      body {
        background-color: #0d1117;
        color: #ffffff;
        min-height: 100vh;
        font-size: 14px;
        font-weight: 400;
        overflow-x: hidden;
      }

      /* Root container */
      #root {
        background-color: #0d1117;
        min-height: 100vh;
        color: #ffffff;
        display: flex;
        flex-direction: column;
      }

      /* Critical loading styles */
      .loading-container {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background-color: #0d1117;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 9999;
      }

      .loading-content {
        text-align: center;
        animation: fadeIn 0.3s ease-in;
      }

      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #21262d;
        border-top: 3px solid #58a6ff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 16px;
      }

      .loading-text {
        color: #8b949e;
        font-size: 14px;
        font-weight: 500;
      }

      .loading-subtext {
        color: #6e7681;
        font-size: 12px;
        margin-top: 8px;
        opacity: 0.8;
      }

      /* Loading skeleton styles */
      .loading-skeleton {
        background: linear-gradient(90deg, #1c2128 25%, #21262d 50%, #1c2128 75%);
        background-size: 200% 100%;
        animation: loading 1.5s infinite;
        border-radius: 4px;
      }

      .skeleton-header {
        height: 64px;
        background: #161b22;
        border-bottom: 1px solid #21262d;
      }

      .skeleton-sidebar {
        width: 256px;
        height: 100vh;
        background: #161b22;
        border-right: 1px solid #21262d;
        position: fixed;
        left: 0;
        top: 0;
      }

      .skeleton-content {
        margin-left: 256px;
        padding: 24px;
      }

      .skeleton-line {
        height: 16px;
        margin-bottom: 12px;
        border-radius: 4px;
      }

      .skeleton-line:nth-child(1) { width: 60%; }
      .skeleton-line:nth-child(2) { width: 80%; }
      .skeleton-line:nth-child(3) { width: 70%; }

      /* Animations */
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes loading {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }

      @keyframes slideInFromLeft {
        from { transform: translateX(-100%); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }

      @keyframes slideInFromRight {
        from { transform: translateX(100%); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }

      /* Hide elements during loading */
      body.loading {
        overflow: hidden;
      }

      body.loading .loading-complete {
        display: none;
      }

      body:not(.loading) .loading-container {
        display: none;
      }

      /* Reduce layout shift */
      img {
        height: auto;
        width: auto;
        max-width: 100%;
      }

      img[data-src] {
        background: linear-gradient(90deg, #1c2128 25%, #21262d 50%, #1c2128 75%);
        background-size: 200% 100%;
        animation: loading 1.5s infinite;
      }

      /* Error boundary styles */
      .error-boundary {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 60vh;
        text-align: center;
      }

      .error-content {
        max-width: 400px;
        padding: 32px;
      }

      .error-icon {
        font-size: 48px;
        margin-bottom: 16px;
      }

      .error-title {
        color: #f85149;
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 8px;
      }

      .error-message {
        color: #8b949e;
        margin-bottom: 24px;
      }

      .error-button {
        background-color: #238636;
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: background-color 0.2s;
      }

      .error-button:hover {
        background-color: #2ea043;
      }

      /* Utility classes */
      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .no-animation {
        animation: none !important;
        transition: none !important;
      }

      /* Dark mode optimizations */
      @media (prefers-color-scheme: dark) {
        :root {
          color-scheme: dark;
        }
      }

      /* High contrast mode support */
      @media (prefers-contrast: high) {
        .loading-spinner {
          border-top-color: #ffffff;
        }

        .loading-text {
          color: #ffffff;
        }
      }

      /* Reduced motion support */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }

        .loading-spinner {
          animation: none;
          border-top-color: #58a6ff;
        }
      }

      /* Print styles */
      @media print {
        .loading-container,
        .loading-skeleton {
          display: none !important;
        }

        body {
          background: white !important;
          color: black !important;
        }
      }

      /* Mobile optimizations */
      @media (max-width: 768px) {
        .skeleton-sidebar {
          transform: translateX(-100%);
        }

        .skeleton-content {
          margin-left: 0;
          padding: 16px;
        }

        .loading-spinner {
          width: 32px;
          height: 32px;
        }

        .loading-text {
          font-size: 12px;
        }
      }
    </style>

    <!-- Performance monitoring script -->
    <script>
      // Mark navigation start
      performance.mark('navigation-start');

      // Track critical resource loading
      window.addEventListener('load', function() {
        performance.mark('load-complete');

        // Measure critical metrics
        const navigation = performance.getEntriesByType('navigation')[0];
        if (navigation) {
          const metrics = {
            domInteractive: navigation.domInteractive,
            domComplete: navigation.domComplete,
            loadEventEnd: navigation.loadEventEnd,
            firstPaint: getFirstPaint(),
            firstContentfulPaint: getFirstContentfulPaint()
          };

          console.log('🎯 Critical loading metrics:', metrics);
        }
      });

      function getFirstPaint() {
        const paintEntries = performance.getEntriesByType('paint');
        const firstPaint = paintEntries.find(entry => entry.name === 'first-paint');
        return firstPaint ? firstPaint.startTime : null;
      }

      function getFirstContentfulPaint() {
        const paintEntries = performance.getEntriesByType('paint');
        const fcp = paintEntries.find(entry => entry.name === 'first-contentful-paint');
        return fcp ? fcp.startTime : null;
      }

      // Remove loading class and show content when React loads
      window.addEventListener('DOMContentLoaded', function() {
        // Progressive enhancement - remove loading state after app mounts
        setTimeout(function() {
          document.body.classList.remove('loading');
        }, 100);
      });

      // Error handling for failed script loads
      window.addEventListener('error', function(event) {
        console.error('🚨 Resource loading error:', event.filename, event.error);
      });

      // Detect slow connections and adapt
      if ('connection' in navigator) {
        const connection = navigator.connection;
        if (connection.effectiveType === 'slow-2g' || connection.effectiveType === '2g') {
          document.documentElement.classList.add('slow-connection');
          console.log('🐌 Slow connection detected, adapting experience');
        }
      }
    </script>
  </head>

  <body class="loading">
    <div id="root">
      <!-- Initial loading screen - shown until React hydrates -->
      <div class="loading-container">
        <div class="loading-content">
          <div class="loading-spinner"></div>
          <div class="loading-text">Loading Aurora...</div>
          <div class="loading-subtext">Preparing your learning experience</div>
        </div>
      </div>

      <!-- Fallback content for JavaScript disabled -->
      <noscript>
        <div style="text-align: center; padding: 50px; color: #8b949e;">
          <h1>JavaScript Required</h1>
          <p>Aurora Language Assistant requires JavaScript to function properly.</p>
          <p>Please enable JavaScript in your browser and refresh the page.</p>
        </div>
      </noscript>
    </div>

    <!-- Main application script -->
    <script type="module" src="/src/main.jsx"></script>

    <!-- Service worker registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js')
            .then(function(registration) {
              console.log('✅ SW registered:', registration.scope);
            })
            .catch(function(error) {
              console.log('❌ SW registration failed:', error);
            });
        });
      }
    </script>

    <!-- Analytics and monitoring (placeholder) -->
    <script>
      // Performance monitoring
      if (window.performance && window.performance.measure) {
        window.addEventListener('load', function() {
          // Measure total loading time
          performance.measure('total-load-time', 'navigation-start', 'load-complete');

          const measure = performance.getEntriesByName('total-load-time')[0];
          if (measure) {
            console.log(`📊 Total load time: ${measure.duration.toFixed(2)}ms`);
          }
        });
      }

      // Track user engagement
      let engagementStart = performance.now();

      document.addEventListener('visibilitychange', function() {
        if (document.visibilityState === 'hidden') {
          const engagementTime = performance.now() - engagementStart;
          console.log(`👤 Session engagement: ${(engagementTime / 1000).toFixed(2)}s`);
        } else {
          engagementStart = performance.now();
        }
      });
    </script>
  </body>
</html>
